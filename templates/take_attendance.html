<!DOCTYPE html>
<html>
    <head>
        <title>Attendance</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <form method="post" action="/get_details">
        <table cellpadding="10" border="1" cellspacing="0" width="70%" align="center" >
            <tbody>
                    {% for i in range(RNOS|length) %}
                    <tr>
                        <td> {{NAMES[i]}}</td>
                        <td>
                            <button type="submit" name="no" value="{{RNOS[i]}}" class="btn btn-success">
                                {{RNOS[i]}}
                            </button>
                        </td>
                    </tr>
                    {% endfor %}
            </tbody>
        </table>
                <div class="text-center mt-3">
                <button align="center" type="submit" name="is_complete" value="complete" class="btn btn-primary"> COMPLETE </button>
                </div>
        </form>

    </body>
</html>
